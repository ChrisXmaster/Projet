<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page non trouvée</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .error-box {
            text-align: center;
            max-width: 480px;
            padding: 40px 24px;
        }

        .error-code {
            font-size: 8rem;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1e2128;
        }

        .error-text {
            color: #6c757d;
            margin-bottom: 28px;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .btn-back {
            background: #0d6efd;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back:hover {
            background: #0b5ed7;
            color: white;
        }
    </style>
</head>

<body>
    <div class="error-box">
        <div class="error-code">404</div>
        <h1 class="error-title">Page non trouvée</h1>
        <p class="error-text">La page que vous recherchez n'existe pas ou a été déplacée. Vérifiez l'URL ou retournez à
            l'accueil.</p>
        <a href="../../index.html" class="btn-back"><i class="bi bi-house"></i> Retour à l'accueil</a>
    </div>
</body>

</html>
