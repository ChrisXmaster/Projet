<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialiser le mot de passe — StageConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/auth.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-panel-left">
            <div class="panel-bg" style="background:linear-gradient(135deg,#198754 0%,#0d6efd 100%)"></div>
            <div class="panel-content">
                <div class="panel-logo">🔒</div>
                <h1>Nouveau<br>mot de passe</h1>
                <p>Choisissez un nouveau mot de passe sécurisé pour votre compte StageConnect.</p>
            </div>
        </div>
        <div class="auth-panel-right">
            <div class="auth-form-wrapper">
                <h2 class="auth-form-title">Nouveau mot de passe</h2>
                <p class="auth-form-subtitle">Choisissez un mot de passe fort d'au moins 8 caractères</p>
                <form>
                    <div class="form-floating-custom">
                        <label>Nouveau mot de passe</label>
                        <div class="input-icon-wrapper">
                            <i class="bi bi-lock input-icon"></i>
                            <input type="password" class="form-control-auth" placeholder="••••••••" required>
                            <button type="button" class="input-toggle-password"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <div class="form-floating-custom">
                        <label>Confirmer le mot de passe</label>
                        <div class="input-icon-wrapper">
                            <i class="bi bi-lock-fill input-icon"></i>
                            <input type="password" class="form-control-auth" placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-auth" onclick="window.location.href='login.html';return false;">
                        <i class="bi bi-check-lg"></i> Réinitialiser le mot de passe
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../assets/js/auth.js"></script>
</body>

</html>
