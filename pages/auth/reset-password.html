<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialiser le mot de passe — StageConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/auth.css">
</head>

<body>
    <div class="conteneur-auth">
        <div class="panneau-gauche">
            <div class="fond-panneau" style="background:linear-gradient(135deg,#198754 0%,#0d6efd 100%)"></div>
            <div class="contenu-panneau">
                <div class="logo-panneau">ðŸ”’</div>
                <h1>Nouveau<br>mot de passe</h1>
                <p>Choisissez un nouveau mot de passe sécurisé pour votre compte StageConnect.</p>
            </div>
        </div>
        <div class="panneau-droit">
            <div class="conteneur-formulaire">
                <h2 class="titre-formulaire">Nouveau mot de passe</h2>
                <p class="sous-titre-formulaire">Choisissez un mot de passe fort d'au moins 8 caractères</p>
                <form>
                    <div class="champ-flottant">
                        <label>Nouveau mot de passe</label>
                        <div class="conteneur-icone-saisie">
                            <i class="bi bi-lock icone-saisie"></i>
                            <input type="password" class="champ-saisie" placeholder="••••••••" required>
                            <button type="button" class="toggle-mot-de-passe"><i class="bi bi-eye"></i></button>
                        </div>
                    </div>
                    <div class="champ-flottant">
                        <label>Confirmer le mot de passe</label>
                        <div class="conteneur-icone-saisie">
                            <i class="bi bi-lock-fill icone-saisie"></i>
                            <input type="password" class="champ-saisie" placeholder="••••••••" required>
                        </div>
                    </div>
                    <button type="submit" class="bouton-connexion" onclick="window.location.href='login.html';return false;">
                        <i class="bi bi-check-lg"></i> Réinitialiser le mot de passe
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
