<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vérification email — StageConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/auth.css">
    <style>
        .verify-box {
            background: white;
            border-radius: 16px;
            padding: 48px 40px;
            text-align: center;
            max-width: 440px;
            margin: 80px auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .verify-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            display: block;
        }

        body {
            background: #f0f2f5;
            min-height: 100vh;
        }

        .auth-wrapper {
            display: block;
        }
    </style>
</head>

<body>
    <div class="verify-box">
        <span class="verify-icon">📧</span>
        <h2 style="font-size:1.5rem;font-weight:800;margin-bottom:12px;">Vérifiez votre email</h2>
        <p style="color:#6c757d;margin-bottom:24px;font-size:0.9rem;line-height:1.7;">
            Un lien de confirmation a été envoyé à votre adresse email. Cliquez sur le lien dans cet email pour activer
            votre compte.
        </p>
        <div
            style="background:#f0f8ff;border-radius:10px;padding:16px;margin-bottom:24px;font-size:0.85rem;color:#0b5ed7;">
            <i class="bi bi-info-circle-fill me-2"></i>
            Vérifiez aussi votre dossier spam si vous ne trouvez pas l'email.
        </div>
        <a href="login.html" class="btn-auth text-decoration-none" style="display:flex;justify-content:center;">
            <i class="bi bi-box-arrow-in-right"></i> Aller à la connexion
        </a>
        <button style="background:none;border:none;color:#6c757d;font-size:0.85rem;margin-top:16px;cursor:pointer;">
            Renvoyer l'email de vérification
        </button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
