<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mot de passe oublié — StageConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../assets/css/auth.css">
</head>

<body>
    <div class="auth-wrapper">
        <div class="auth-panel-left">
            <div class="panel-bg" style="background:linear-gradient(135deg,#fd7e14 0%,#dc3545 100%)"></div>
            <div class="panel-content">
                <div class="panel-logo">🔑</div>
                <h1>Réinitialisation<br>du mot de passe</h1>
                <p>Entrez votre adresse email et nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>
            </div>
        </div>
        <div class="auth-panel-right">
            <div class="auth-form-wrapper">
                <a href="login.html" class="d-flex align-items-center gap-2 text-decoration-none mb-4"
                    style="color:#6c757d;font-size:0.85rem;">
                    <i class="bi bi-arrow-left"></i> Retour à la connexion
                </a>
                <h2 class="auth-form-title">Mot de passe oublié</h2>
                <p class="auth-form-subtitle">Saisissez votre email pour recevoir le lien de réinitialisation</p>
                <form>
                    <div class="form-floating-custom">
                        <label>Adresse email</label>
                        <div class="input-icon-wrapper">
                            <i class="bi bi-envelope input-icon"></i>
                            <input type="email" class="form-control-auth" placeholder="votre@email.com" required>
                        </div>
                    </div>
                    <button type="submit" class="btn-auth"
                        onclick="window.location.href='reset-password.html';return false;">
                        <i class="bi bi-send"></i> Envoyer le lien
                    </button>
                </form>
                <p class="auth-footer-text">
                    Vous vous souvenez ? <a href="login.html" class="auth-link">Se connecter</a>
                </p>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
